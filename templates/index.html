<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ГИФ Сайт Ёжика Туманчика</title>
    <style>
        body { background: #2c3e50; color: #ecf0f1; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; display: inline-block; }
        .gif-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .gif-card { background: #34495e; padding: 10px; border-radius: 10px; }
        img { max-width: 100%; border-radius: 5px; }
        .btn { background: #e67e22; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦔 ГИФ САЙТ ЁЖИКА ТУМАНЧИКА ☁️</h1>
        
        {% if not user %}
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="Имя" required>
                <input type="password" name="password" placeholder="Пароль" required>
                <button type="submit" class="btn">Войти</button>
            </form>
        {% else %}
            <p>Привет, {{ user }}! | <a href="/logout" style="color: #bdc3c7;">Выйти</a></p>
            
            <hr>
            <h3>Загрузить новую ГИФку:</h3>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="file" name="gif_file" accept=".gif, .jpg, .png" required>
                <button type="submit" class="btn">ОПУБЛИКОВАТЬ</button>
            </form>
        {% endif %}
    </div>

    <div class="gif-grid">
        {% for gif in gifs %}
            <div class="gif-card">
                <img src="{{ url_for('static', filename='uploads/' + gif) }}">
                <br>
                <a href="{{ url_for('static', filename='uploads/' + gif) }}" download class="btn" style="background: #27ae60; font-size: 12px;">Скачать</a>
            </div>
        {% endfor %}
    </div>
</body>
</html>
