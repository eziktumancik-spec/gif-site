<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GIF Star Destroyer</title>
    <style>
        body { 
            background: #121212; 
            color: #00FF41; 
            font-family: 'Courier New', monospace; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .container { border: 2px solid #00FF41; padding: 20px; box-shadow: 0 0 15px #00FF41; }
        input { background: #000; border: 1px solid #00FF41; color: #00FF41; padding: 10px; margin: 5px; }
        button { background: #00FF41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .gif-list { margin-top: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>[ SYSTEM: GIF_STAR_DESTROYER ]</h1>

        {% if not user %}
            <h3>Вход в систему:</h3>
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="Логин" required>
                <input type="password" name="password" placeholder="Пароль" required>
                <button type="submit">ИНИЦИИРОВАТЬ</button>
            </form>
        {% else %}
            <p>Добро пожаловать, адмирал <strong>{{ user }}</strong>!</p>
            <a href="/logout" style="color: #FF3131;">[ ВЫХОД ]</a>
        {% endif %}
    </div>

    <div class="gif-list">
        {% for gif in gifs %}
            <img src="{{ gif }}" width="200">
        {% endfor %}
    </div>

</body>
</html>
